services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G

  api:
    image: docintel-api:0.1.0
    restart: unless-stopped
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json
    volumes:
      - artifacts_data:/app/artifacts
      - model_cache:/app/.model_cache
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 4G

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    image: docintel-dashboard:0.1.0
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/docintel
      API_BASE_URL: http://api:8000/api/v1
      API_KEY: ${API_KEYS:-dev-key-change-me}
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

volumes:
  artifacts_data:
