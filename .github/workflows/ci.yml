name: ci

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Lint
        run: uvx --from ruff==0.15.7 ruff check apps/api/src apps/api/tests apps/dashboard
      - name: API type check
        run: uv run --directory apps/api --with mypy==1.18.2 mypy --config-file ../../mypy.ini src
      - name: Dashboard type check
        run: uv run --directory apps/dashboard --with mypy==1.18.2 mypy --config-file ../../mypy.ini app.py lib pages

  api-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/docintel
      API_KEYS: dev-key-change-me
      SECRET_KEY: dev-secret-not-for-production
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: docintel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d docintel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install API dependencies
        run: uv sync --directory apps/api
      - name: Enable pgvector
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d docintel -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run API test suite
        run: uv run --directory apps/api pytest tests -v

  dashboard-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install dashboard dependencies
        run: uv sync --directory apps/dashboard
      - name: Run dashboard tests
        run: uv run --directory apps/dashboard pytest tests/test_db_queries.py -v
      - name: Compile dashboard scripts
        run: uv run --directory apps/dashboard python -m compileall app.py lib pages tests
