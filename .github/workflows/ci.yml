name: ci

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Lint
        run: uvx --from ruff==0.15.7 ruff check apps/api/src apps/api/tests apps/dashboard
      - name: API type check
        run: uv run --directory apps/api --with mypy==1.18.2 mypy --config-file ../../mypy.ini src
      - name: Dashboard type check
        run: uv run --directory apps/dashboard --with mypy==1.18.2 mypy --config-file ../../mypy.ini app.py lib pages

  api-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/docintel
      API_KEYS: dev-key-change-me
      SECRET_KEY: dev-secret-not-for-production
      MODEL_CACHE_DIR: ${{ github.workspace }}/apps/api/.model_cache
      ARTIFACT_STORAGE_PATH: ${{ github.workspace }}/apps/api/artifacts
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: docintel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d docintel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install API dependencies
        run: uv sync --directory apps/api
      - name: Enable pgvector
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d docintel -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run API test suite
        run: uv run --directory apps/api pytest tests -v

  dashboard-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install dashboard dependencies
        run: uv sync --directory apps/dashboard
      - name: Run dashboard tests
        run: uv run --directory apps/dashboard pytest tests/test_db_queries.py -v
      - name: Compile dashboard scripts
        run: uv run --directory apps/dashboard python -m compileall app.py lib pages tests

  api-image-build:
    runs-on: ubuntu-latest
    needs:
      - lint-and-typecheck
      - api-tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          tags: docintel-api:ci
          push: false
          cache-from: type=gha,scope=docintel-api
          cache-to: type=gha,mode=max,scope=docintel-api

  dashboard-image-build:
    runs-on: ubuntu-latest
    needs:
      - lint-and-typecheck
      - dashboard-tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: apps/dashboard
          file: apps/dashboard/Dockerfile
          tags: docintel-dashboard:ci
          push: false
          cache-from: type=gha,scope=docintel-dashboard
          cache-to: type=gha,mode=max,scope=docintel-dashboard
