name: ragas-eval

on:
  pull_request:
  workflow_dispatch:

jobs:
  ragas-eval:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/docintel
      API_KEYS: dev-key-change-me
      SECRET_KEY: dev-secret-not-for-production
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MODEL_CACHE_DIR: ${{ github.workspace }}/apps/api/.model_cache
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: docintel
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d docintel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Require OpenRouter secret
        run: |
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "OPENROUTER_API_KEY secret is required for ragas-eval.yml" >&2
            exit 1
          fi
      - name: Cache model downloads
        uses: actions/cache@v4
        with:
          path: apps/api/.model_cache
          key: ${{ runner.os }}-docintel-model-cache-${{ hashFiles('apps/api/uv.lock') }}
      - name: Install dependencies
        run: uv sync --directory apps/api
      - name: Enable pgvector
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d docintel -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run migrations
        run: uv run --directory apps/api alembic upgrade head
      - name: Download official EU AI Act PDF
        run: |
          mkdir -p data/source
          curl -L "https://op.europa.eu/o/opportal-service/download-handler?format=PDF&identifier=dc8116a1-3fe6-11ef-865a-01aa75ed71a1&language=en&productionSystem=cellar" -o data/source/eu_ai_act_2024_1689_en.pdf
      - name: Ingest corpus
        run: uv run --directory apps/api python -m docintel.tools.ingest_eu_ai_act --path "../../data/source/eu_ai_act_2024_1689_en.pdf" --source-uri "https://op.europa.eu/o/opportal-service/download-handler?format=PDF&identifier=dc8116a1-3fe6-11ef-865a-01aa75ed71a1&language=en&productionSystem=cellar"
      - name: Run eval gate
        run: uv run --directory apps/api python -m docintel.services.evaluation.ci_gate --fail-on-breach
